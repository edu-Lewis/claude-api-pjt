<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>냉장고 식재료 인식</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <h1>냉장고 사진으로 식재료 인식</h1>

    <input id="file-input" type="file" accept="image/*" />
    <div id="preview-wrap">
      <img id="preview" alt="미리보기" hidden />
    </div>
    <button id="recognize-btn" disabled>인식하기</button>

    <section id="status"></section>

    <section id="result" hidden>
      <h2>인식된 식재료</h2>
      <ul id="items"></ul>
      <details>
        <summary>모델 원본 응답</summary>
        <pre id="raw"></pre>
      </details>
      <button id="recipe-btn">이 재료로 레시피 생성</button>
    </section>

    <section id="recipe-status"></section>

    <section id="recipe-result" hidden>
      <h2>추천 레시피</h2>
      <div id="recipe-list"></div>
      <details>
        <summary>모델 원본 응답</summary>
        <pre id="recipe-raw"></pre>
      </details>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
