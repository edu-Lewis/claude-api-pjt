<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>냉장고 식재료 인식</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <h1>냉장고 사진으로 식재료 인식</h1>

    <section id="auth-section">
      <div id="auth-logged-out">
        <h2>로그인</h2>
        <input id="auth-email" type="email" placeholder="이메일" />
        <input id="auth-password" type="password" placeholder="비밀번호 (6자 이상)" />
        <div class="auth-buttons">
          <button id="signup-btn">회원가입</button>
          <button id="login-btn">로그인</button>
        </div>
        <p id="auth-status" class="hint"></p>
      </div>
      <div id="auth-logged-in" hidden>
        <span id="auth-email-display"></span>
        <button id="logout-btn">로그아웃</button>
      </div>
    </section>

    <input id="file-input" type="file" accept="image/*" />
    <div id="preview-wrap">
      <img id="preview" alt="미리보기" hidden />
    </div>
    <button id="recognize-btn" disabled>인식하기</button>

    <section id="status"></section>

    <section id="result" hidden>
      <h2>인식된 식재료</h2>
      <ul id="items"></ul>
      <details>
        <summary>모델 원본 응답</summary>
        <pre id="raw"></pre>
      </details>
      <button id="recipe-btn">이 재료로 레시피 생성</button>
    </section>

    <section id="recipe-status"></section>

    <section id="recipe-result" hidden>
      <h2>추천 레시피</h2>
      <div id="recipe-list"></div>
      <details>
        <summary>모델 원본 응답</summary>
        <pre id="recipe-raw"></pre>
      </details>
    </section>

    <section id="saved-recipes-section" hidden>
      <h2>내 레시피</h2>
      <p id="saved-recipes-status" class="hint"></p>
      <div id="saved-recipes-list"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
